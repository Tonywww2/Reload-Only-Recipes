modLoader = "javafml"
loaderVersion = "[47,)"
license = "All Rights Reserved"

[[mixins]]
config = "reloadonlyrecipes.mixins.json"

[[mods]]
modId = "${id}"
version = "${version}"
displayName = "${name}"
authors = "${authors}"

[[dependencies.${id}]]
modId = "forge"
mandatory = true
versionRange = "[47,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${id}]]
modId = "minecraft"
mandatory = true
versionRange = "[1.20.1,1.21)"
ordering = "NONE"
side = "BOTH"

# KubeJS 为软依赖：可选、若安装则加载顺序在本 mod 之前
[[dependencies.${id}]]
modId = "kubejs"
mandatory = false
versionRange = "[0,)"
ordering = "AFTER"
side = "BOTH"
